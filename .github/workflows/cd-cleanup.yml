name: CD Cleanup

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      build_check_run_id:
        required: true
        type: string
      cleanup_check_run_id:
        required: true
        type: string
      build_conclusion:
        required: true
        type: string
      upload_dataset_check_run_id:
        required: false
        type: string
      upload_dataset_conclusion:
        required: true
        type: string
      upload_artifact_check_run_id:
        required: false
        type: string
      upload_artifact_conclusion:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      kubernetes_job_name:
        required: false
        type: string

jobs:

  collect-log:

    name: Collect Kubernetes Job log

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          kubeconfig_path="$RUNNER_TEMP/kubeconfig"
          echo "$KUBE_CONFIG" | base64 -d > "$kubeconfig_path"
          chmod 600 "$kubeconfig_path"
          echo "KUBECONFIG=$kubeconfig_path" >> "$GITHUB_ENV"

      - name: Collect and redact Kubernetes Job log
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBERNETES_JOB_NAME: ${{ inputs.kubernetes_job_name }}
        run: |
          raw_log_file="$RUNNER_TEMP/kubernetes-job.raw.log"
          redacted_log_file="$RUNNER_TEMP/kubernetes-job.log"
          if [ -z "$KUBERNETES_JOB_NAME" ]; then
            echo "No Kubernetes Job was created for this deployment." > "$raw_log_file"
          elif kubectl logs \
            --namespace="$KUBE_NAMESPACE" \
            "job/$KUBERNETES_JOB_NAME" \
            --container=build \
            --timestamps > "$raw_log_file" 2>&1; then
            :
          else
            status=$?
            printf 'Failed to collect logs from Kubernetes Job %s (exit %s).\n' \
              "$KUBERNETES_JOB_NAME" "$status" >> "$raw_log_file"
          fi

          python3 .github/scripts/redact-log.py "$raw_log_file" "$redacted_log_file" \
            --template-file .github/k8s/job.yaml \
            --secret-env KUBE_CONFIG
          rm -f "$raw_log_file"

      - name: Upload Kubernetes Job log
        uses: actions/upload-artifact@v4
        with:
          name: kubernetes-job-log-${{ inputs.kubernetes_job_name || github.run_id }}
          path: ${{ runner.temp }}/kubernetes-job.log
          if-no-files-found: error

  update-deploy-checks:

    runs-on: ubuntu-latest

    steps:

      - name: Create GitHub App token for post-deploy checks
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-checks: write

      - name: Update deploy checks
        uses: actions/github-script@v9
        env:
          BUILD_CHECK_RUN_ID: ${{ inputs.build_check_run_id }}
          BUILD_CONCLUSION: ${{ inputs.build_conclusion }}
          UPLOAD_DATASET_CHECK_RUN_ID: ${{ inputs.upload_dataset_check_run_id }}
          UPLOAD_DATASET_CONCLUSION: ${{ inputs.upload_dataset_conclusion }}
          UPLOAD_ARTIFACT_CHECK_RUN_ID: ${{ inputs.upload_artifact_check_run_id }}
          UPLOAD_ARTIFACT_CONCLUSION: ${{ inputs.upload_artifact_conclusion }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const checks = [
              [process.env.BUILD_CHECK_RUN_ID, process.env.BUILD_CONCLUSION],
              [process.env.UPLOAD_DATASET_CHECK_RUN_ID, process.env.UPLOAD_DATASET_CONCLUSION],
              [process.env.UPLOAD_ARTIFACT_CHECK_RUN_ID, process.env.UPLOAD_ARTIFACT_CONCLUSION],
            ].filter(([checkRunId]) => checkRunId);
            const allowedConclusions = new Set(['success', 'failure']);

            for (const [checkRunId, conclusion] of checks) {
              const normalizedConclusion = allowedConclusions.has(conclusion)
                ? conclusion
                : 'failure';

              await github.rest.checks.update({
                ...context.repo,
                check_run_id: checkRunId,
                status: 'completed',
                conclusion: normalizedConclusion,
                completed_at: new Date().toISOString(),
              });
            }

  delete-image:

    runs-on: ubuntu-latest

    steps:
      - name: Delete temporary Docker image
        shell: bash
        env:
          GITHUB_API_URL: ${{ github.api_url }}
          # This org-scoped package does not grant package-admin access to the
          # workflow token. GHCR_TOKEN must be a classic PAT with
          # read:packages and delete:packages scopes, and package admin access.
          PACKAGE_TOKEN: ${{ secrets.GHCR_TOKEN }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ vars.IMAGE_NAME }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "${GITHUB_API_URL:-}" ] ||
            [ -z "${PACKAGE_TOKEN:-}" ] ||
            [ -z "${PACKAGE_OWNER:-}" ] ||
            [ -z "${PACKAGE_NAME:-}" ] ||
            [ -z "${IMAGE_TAG:-}" ]; then
            echo "GitHub Packages cleanup environment is incomplete; skipping ${IMAGE_TAG:-unknown} deletion." >&2
            exit 0
          fi

          package_versions_url="${GITHUB_API_URL%/}/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}/versions"
          version_id=""
          page=1

          while :; do
            versions="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${PACKAGE_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              --get --data-urlencode "per_page=100" --data-urlencode "page=${page}" \
              "${package_versions_url}")"
            version_id="$(printf '%s' "${versions}" | jq -r --arg image_tag "${IMAGE_TAG}" \
              '([.[] | select(.metadata.container.tags | index($image_tag)) | .id] | .[0]) // empty')"

            if [ -n "${version_id}" ] || [ "$(printf '%s' "${versions}" | jq 'length')" -eq 0 ]; then
              break
            fi

            page=$((page + 1))
          done

          if [ -z "${version_id}" ]; then
            echo "Docker image tag ${PACKAGE_OWNER}/${PACKAGE_NAME}:${IMAGE_TAG} is already absent."
            exit 0
          fi

          delete_response="$(mktemp)"
          delete_headers="$(mktemp)"
          trap 'rm -f "${delete_response}" "${delete_headers}"' EXIT

          delete_status="$(curl -sS -D "${delete_headers}" -o "${delete_response}" -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PACKAGE_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -X DELETE "${package_versions_url}/${version_id}" || true)"

          if [ "${delete_status}" = "204" ] || [ "${delete_status}" = "404" ]; then
            echo "Deleted Docker image tag ${PACKAGE_OWNER}/${PACKAGE_NAME}:${IMAGE_TAG}."
            exit 0
          fi

          error_message="$(jq -r '.message // empty' "${delete_response}" 2>/dev/null || true)"
          if [ "${delete_status}" = "400" ] &&
            [ "${error_message}" = "You cannot delete the last tagged version of a package. You must delete the package instead." ]; then
            package_url="${GITHUB_API_URL%/}/orgs/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}"
            package_delete_status="$(curl -sS -D "${delete_headers}" -o "${delete_response}" -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${PACKAGE_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -X DELETE "${package_url}" || true)"

            if [ "${package_delete_status}" = "204" ] || [ "${package_delete_status}" = "404" ]; then
              echo "Deleted last Docker image tag by deleting package ${PACKAGE_OWNER}/${PACKAGE_NAME}."
              exit 0
            fi

            delete_status="${package_delete_status}"
            error_message="$(jq -r '.message // empty' "${delete_response}" 2>/dev/null || true)"
          fi

          request_id="$(awk 'BEGIN { IGNORECASE = 1 } /^x-github-request-id:/ { print $2 }' "${delete_headers}" | tr -d '\r' | tail -n 1)"
          echo "Could not delete Docker image tag ${PACKAGE_OWNER}/${PACKAGE_NAME}:${IMAGE_TAG}; GitHub API returned HTTP ${delete_status}${error_message:+: ${error_message}}${request_id:+ (request ID: ${request_id})}." >&2
          exit 1

  finalize-cleanup-check:

    name: Finalize CD Cleanup check

    needs:
      - update-deploy-checks
      - delete-image

    if: ${{ always() }}

    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-checks: write

      - name: Complete CD Cleanup check
        uses: actions/github-script@v9
        env:
          CLEANUP_CHECK_RUN_ID: ${{ inputs.cleanup_check_run_id }}
          UPDATE_RESULT: ${{ needs.update-deploy-checks.result }}
          DELETE_IMAGE_RESULT: ${{ needs.delete-image.result }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const results = {
              updateDeployChecks: process.env.UPDATE_RESULT,
              deleteImage: process.env.DELETE_IMAGE_RESULT,
            };
            const conclusion = Object.values(results).every((result) => result === 'success')
              ? 'success'
              : 'failure';

            await github.rest.checks.update({
              ...context.repo,
              check_run_id: Number(process.env.CLEANUP_CHECK_RUN_ID),
              status: 'completed',
              conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: 'CD Cleanup',
                summary: `Cleanup result: ${conclusion}. Check updates: ${results.updateDeployChecks}; temporary image deletion: ${results.deleteImage}.`,
              },
            });
