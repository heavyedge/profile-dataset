name: CI

on:
  push:
  pull_request:

jobs:

  lint:

    runs-on: ubuntu-latest

    steps:

      - name: get repo
        uses: actions/checkout@v3

      - name: set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: set up uv
        uses: astral-sh/setup-uv@v5

      - name: install dependencies
        run: |
          uv pip install --system flake8 black isort

      - name: lint with flake8
        run: |
          flake8

      - name: lint with black
        run: |
          black --check .

      - name: lint with isort
        run: |
          isort --check .

  test:

    runs-on: ubuntu-latest

    steps:

      - name: get repo
        uses: actions/checkout@v3

      - name: set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: set up uv
        uses: astral-sh/setup-uv@v5

      - name: install package
        run: |
          uv pip install --system -r requirements.txt

      - name: download dataset
        run: ./download.sh
        env:
          GDRIVE_LINK: ${{ secrets.GOOGLE_DRIVE_LINK }}

      - name: test
        run: |
          make datasets/v1/dataset1/001.h5
          make datasets/v1/dataset1/001-Mean.h5

  image-dev:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          target: dev
          cache-from: type=gha,scope=profile-dataset-dev
          cache-to: type=gha,mode=max,scope=profile-dataset-dev
          tags: heavyedge-profile-dataset:dev-ci

      - name: Test Docker image
        run: |
          docker run --rm heavyedge-profile-dataset:dev-ci sh -c 'export GDRIVE_LINK=$GDRIVE_LINK && uv pip install --system -r requirements.txt && ./download.sh && make test'
        env:
          GDRIVE_LINK: ${{ secrets.GOOGLE_DRIVE_LINK }}
