name: CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  release:
    types: [published]

permissions:
  checks: write
  packages: write

jobs:

  build-image:

    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.image-metadata.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set Docker image metadata
        id: image-metadata
        shell: bash
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          echo "tag=${GIT_SHA::7}-${RUN_ID}-${RUN_ATTEMPT}-dev" >> "$GITHUB_OUTPUT"

      - name: Build and push temporary Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: dev
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=profile-dataset-dev
          cache-to: type=gha,mode=max,scope=profile-dataset-dev
          tags: ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:${{ steps.image-metadata.outputs.tag }}

  resolve-variables:

    runs-on: ubuntu-latest

    outputs:
      dataset_mode: ${{ steps.configuration.outputs.dataset_mode }}
      email_recipient: ${{ steps.email.outputs.email }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Resolve CD configuration
        id: configuration
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          python3 .github/scripts/parse-version.py \
            --event-name "$EVENT_NAME" \
            --ref-name "$REF_NAME"

      - name: Resolve email recipient
        id: email
        uses: actions/github-script@v9
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          NOTIFY_EMAIL_MAP: ${{ vars.SMTP_NOTIFY_EMAIL_MAP }}
        with:
          script: |
            const noreplyPattern = /(^|@)(users\.)?noreply\.github\.com$/i;
            const usableEmail = (email) => email && !noreplyPattern.test(email);

            let emailMap = {};
            if (process.env.NOTIFY_EMAIL_MAP) {
              try {
                emailMap = JSON.parse(process.env.NOTIFY_EMAIL_MAP);
              } catch (error) {
                core.warning(`Ignoring invalid SMTP_NOTIFY_EMAIL_MAP JSON: ${error.message}`);
              }
            }

            const { data: commit } = await github.rest.repos.getCommit({
              ...context.repo,
              ref: process.env.GIT_SHA,
            });

            const candidates = [
              context.payload.pull_request?.user?.login,
              context.payload.release?.author?.login,
              commit.author?.login,
              commit.committer?.login,
              context.actor,
            ].filter(Boolean);
            const login = [...new Set(candidates)][0];

            if (login && emailMap[login]) {
              core.setOutput('email', emailMap[login]);
              return;
            }

            if (login) {
              const { data: user } = await github.rest.users.getByUsername({ username: login });
              if (usableEmail(user.email)) {
                core.setOutput('email', user.email);
                return;
              }
            }

            const commitEmails = [
              commit.commit.author?.email,
              commit.commit.committer?.email,
            ];
            const commitEmail = commitEmails.find(usableEmail);
            if (commitEmail) {
              core.setOutput('email', commitEmail);
              return;
            }

            core.warning(
              `Could not resolve a public notification email for ${login || 'the commit author'}; deployment email notification will be skipped.`
            );
            core.setOutput('email', '');

  create-checks:

    needs:
      - resolve-variables

    outputs:
      build-check-run-id: ${{ steps.deploy-checks.outputs.build-check-run-id }}
      upload-dataset-check-run-id: ${{ steps.deploy-checks.outputs.upload-dataset-check-run-id }}
      cleanup-check-run-id: ${{ steps.deploy-checks.outputs.cleanup-check-run-id }}

    runs-on: ubuntu-latest

    steps:

      - name: Create GitHub App token for deploy checks
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-checks: write

      - name: Create deploy checks
        id: deploy-checks
        uses: actions/github-script@v9
        env:
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          MODEL_MODE: ${{ needs.resolve-variables.outputs.model_mode }}
          PUSH_DOC: ${{ needs.resolve-variables.outputs.push_doc }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
              const checks = [
                ['build-check-run-id', 'Build', 'Build is queued.'],
                ['cleanup-check-run-id', 'CD Cleanup', 'CD cleanup is queued.'],
              ];
              if (process.env.MODEL_MODE === 'release') {
                checks.push(['upload-dataset-check-run-id', 'Upload dataset', 'Dataset upload is queued.']);
              }

              for (const [outputName, checkName, summary] of checks) {
                const response = await github.rest.checks.create({
                  ...context.repo,
                  name: checkName,
                  head_sha: process.env.GIT_SHA,
                  status: 'in_progress',
                  started_at: new Date().toISOString(),
                  details_url: process.env.GITHUB_RUN_URL,
                  output: {
                    title: checkName,
                    summary,
                  },
                });

                core.setOutput(outputName, String(response.data.id));
              }

  deploy:

    needs:
      - build-image
      - resolve-variables
      - create-checks

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create Docker secrets
        env:
          DOCKER_REGISTRY: ghcr.io
          DOCKER_USERNAME: ${{ secrets.GHCR_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.GHCR_TOKEN }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          kubectl create secret docker-registry regcred \
            --docker-server="$DOCKER_REGISTRY" \
            --docker-username="$DOCKER_USERNAME" \
            --docker-password="$DOCKER_PASSWORD" \
            --namespace="$KUBE_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Gmail relay secret
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          if [ -z "$GMAIL_USERNAME" ]; then
            echo "::error::Missing GMAIL_USERNAME secret for SMTP relay."
            exit 1
          fi
          if [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "::error::Missing GMAIL_APP_PASSWORD secret for SMTP relay."
            exit 1
          fi

          kubectl create secret generic gmail-smtp-relay \
            --from-literal=GMAIL_USERNAME="$GMAIL_USERNAME" \
            --from-literal=GMAIL_APP_PASSWORD="$GMAIL_APP_PASSWORD" \
            --namespace="$KUBE_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Google Drive link secret
        env:
          GDRIVE_LINK: ${{ secrets.GOOGLE_DRIVE_LINK }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          kubectl create secret generic gdrive \
            --from-literal=GDRIVE_LINK="$GDRIVE_LINK" \
            --namespace="$KUBE_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Hugging Face token secret
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          kubectl create secret generic huggingface-token \
            --from-literal=HUGGINGFACE_TOKEN="$HUGGINGFACE_TOKEN" \
            --namespace="$KUBE_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GitHub app secret
        env:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          if [ -z "$GH_APP_ID" ]; then
            echo "::error::Missing GH_APP_ID secret for GitHub check runs and documentation branch pushes."
            exit 1
          fi
          if [ -z "$GH_APP_PRIVATE_KEY" ]; then
            echo "::error::Missing GH_APP_PRIVATE_KEY secret for GitHub check runs and documentation branch pushes."
            exit 1
          fi

          kubectl create secret generic github-app \
            --from-literal=GH_APP_ID="$GH_APP_ID" \
            --from-literal=GH_APP_PRIVATE_KEY="$GH_APP_PRIVATE_KEY" \
            --from-literal=GH_APP_INSTALLATION_ID="$GH_APP_INSTALLATION_ID" \
            --namespace="$KUBE_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        shell: bash
        env:
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_USERNAME: ${{ secrets.KUBE_USERNAME }}
          MLXP_ZONE: ${{ secrets.MLXP_ZONE }}
          CPU_REQUEST: ${{ needs.resolve-variables.outputs.dataset_mode == 'test' && '1' || vars.CPU_REQUEST }}
          DOCKER_REGISTRY: ghcr.io
          DOCKER_NAMESPACE: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.build-image.outputs.tag }}
          DATASET_MODE: ${{ needs.resolve-variables.outputs.dataset_mode }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_DISPATCH_REF: ${{ github.head_ref || github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SMTP_NOTIFY_RECIPIENT: ${{ needs.resolve-variables.outputs.email_recipient }}
          BUILD_CHECK_RUN_ID: ${{ needs.create-checks.outputs.build-check-run-id }}
          UPLOAD_DATASET_CHECK_RUN_ID: ${{ needs.create-checks.outputs.upload-dataset-check-run-id }}
          CLEANUP_CHECK_RUN_ID: ${{ needs.create-checks.outputs.cleanup-check-run-id }}
        run: |
          job_name="heavyedge-feature-models-${GITHUB_SHA::7}-${RUN_ID}-${RUN_ATTEMPT}"
          export JOB_NAME="$job_name"
          template_vars="$(grep -oE '\$\{[A-Z_][A-Z0-9_]*\}' .github/k8s/job.yaml | sort -u | tr '\n' ' ')"
          envsubst "$template_vars" < .github/k8s/job.yaml | kubectl apply -f -
          kubectl wait \
            --namespace="$KUBE_NAMESPACE" \
            --for=create \
            "pod" \
            --selector="job-name=${job_name}" \
            --timeout=120s

  deploy-fallback:

    needs:
      - build-image
      - create-checks
      - deploy

    if: ${{ always() && needs.deploy.result == 'failure' }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Create GitHub App token for cd-cleanup dispatch
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-actions: write

      - name: Dispatch cd-cleanup workflow
        shell: bash
        env:
          GITHUB_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_DISPATCH_REF: ${{ github.head_ref || github.ref_name }}
          BUILD_CHECK_RUN_ID: ${{ needs.create-checks.outputs.build-check-run-id }}
          UPLOAD_DATASET_CHECK_RUN_ID: ${{ needs.create-checks.outputs.upload-dataset-check-run-id }}
          CLEANUP_CHECK_RUN_ID: ${{ needs.create-checks.outputs.cleanup-check-run-id }}
          IMAGE_TAG: ${{ needs.build-image.outputs.tag }}
          BUILD_CONCLUSION: failure
          UPLOAD_DATASET_CONCLUSION: failure
        run: |
          sh .github/scripts/deploy-dispatch.sh
