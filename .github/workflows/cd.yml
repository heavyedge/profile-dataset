name: CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  release:
    types: [published]

permissions:
  checks: write

jobs:

  resolve-variables:

    runs-on: ubuntu-latest

    outputs:
      email_recipient: ${{ steps.email.outputs.email }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Resolve email recipient
        id: email
        uses: actions/github-script@v9
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          NOTIFY_EMAIL_MAP: ${{ vars.SMTP_NOTIFY_EMAIL_MAP }}
        with:
          script: |
            const noreplyPattern = /(^|@)(users\.)?noreply\.github\.com$/i;
            const usableEmail = (email) => email && !noreplyPattern.test(email);

            let emailMap = {};
            if (process.env.NOTIFY_EMAIL_MAP) {
              try {
                emailMap = JSON.parse(process.env.NOTIFY_EMAIL_MAP);
              } catch (error) {
                core.warning(`Ignoring invalid SMTP_NOTIFY_EMAIL_MAP JSON: ${error.message}`);
              }
            }

            const { data: commit } = await github.rest.repos.getCommit({
              ...context.repo,
              ref: process.env.GIT_SHA,
            });

            const candidates = [
              context.payload.pull_request?.user?.login,
              context.payload.release?.author?.login,
              commit.author?.login,
              commit.committer?.login,
              context.actor,
            ].filter(Boolean);
            const login = [...new Set(candidates)][0];

            if (login && emailMap[login]) {
              core.setOutput('email', emailMap[login]);
              return;
            }

            if (login) {
              const { data: user } = await github.rest.users.getByUsername({ username: login });
              if (usableEmail(user.email)) {
                core.setOutput('email', user.email);
                return;
              }
            }

            const commitEmails = [
              commit.commit.author?.email,
              commit.commit.committer?.email,
            ];
            const commitEmail = commitEmails.find(usableEmail);
            if (commitEmail) {
              core.setOutput('email', commitEmail);
              return;
            }

            core.warning(
              `Could not resolve a public notification email for ${login || 'the commit author'}; deployment email notification will be skipped.`
            );
            core.setOutput('email', '');

  create-checks:

    needs:
      - resolve-variables

    outputs:
      build-check-run-id: ${{ steps.deploy-checks.outputs.build-check-run-id }}
      upload-dataset-check-run-id: ${{ steps.deploy-checks.outputs.upload-dataset-check-run-id }}
      cleanup-check-run-id: ${{ steps.deploy-checks.outputs.cleanup-check-run-id }}

    runs-on: ubuntu-latest

    steps:

      - name: Create GitHub App token for deploy checks
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-checks: write

      - name: Create deploy checks
        id: deploy-checks
        uses: actions/github-script@v9
        env:
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          MODEL_MODE: ${{ needs.resolve-variables.outputs.model_mode }}
          PUSH_DOC: ${{ needs.resolve-variables.outputs.push_doc }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
              const checks = [
                ['build-check-run-id', 'Build', 'Build is queued.'],
                ['cleanup-check-run-id', 'CD Cleanup', 'CD cleanup is queued.'],
              ];
              if (process.env.MODEL_MODE === 'release') {
                checks.push(['upload-dataset-check-run-id', 'Upload dataset', 'Dataset upload is queued.']);
              }

              for (const [outputName, checkName, summary] of checks) {
                const response = await github.rest.checks.create({
                  ...context.repo,
                  name: checkName,
                  head_sha: process.env.GIT_SHA,
                  status: 'in_progress',
                  started_at: new Date().toISOString(),
                  details_url: process.env.GITHUB_RUN_URL,
                  output: {
                    title: checkName,
                    summary,
                  },
                });

                core.setOutput(outputName, String(response.data.id));
              }

  deploy:

    needs:
      - resolve-variables
      - create-checks

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create Gmail relay secret
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          if [ -z "$GMAIL_USERNAME" ]; then
            echo "::error::Missing GMAIL_USERNAME secret for SMTP relay."
            exit 1
          fi
          if [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "::error::Missing GMAIL_APP_PASSWORD secret for SMTP relay."
            exit 1
          fi

          kubectl create secret generic gmail-smtp-relay \
            --from-literal=GMAIL_USERNAME="$GMAIL_USERNAME" \
            --from-literal=GMAIL_APP_PASSWORD="$GMAIL_APP_PASSWORD" \
            --namespace="$KUBE_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Hugging Face token secret
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          kubectl create secret generic huggingface-token \
            --from-literal=HUGGINGFACE_TOKEN="$HUGGINGFACE_TOKEN" \
            --namespace="$KUBE_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GitHub app secret
        env:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          if [ -z "$GH_APP_ID" ]; then
            echo "::error::Missing GH_APP_ID secret for GitHub check runs and documentation branch pushes."
            exit 1
          fi
          if [ -z "$GH_APP_PRIVATE_KEY" ]; then
            echo "::error::Missing GH_APP_PRIVATE_KEY secret for GitHub check runs and documentation branch pushes."
            exit 1
          fi

          kubectl create secret generic github-app \
            --from-literal=GH_APP_ID="$GH_APP_ID" \
            --from-literal=GH_APP_PRIVATE_KEY="$GH_APP_PRIVATE_KEY" \
            --from-literal=GH_APP_INSTALLATION_ID="$GH_APP_INSTALLATION_ID" \
            --namespace="$KUBE_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -


  deploy-fallback:

    needs:
      - create-checks

    if: ${{ always() }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Create GitHub App token for cd-cleanup dispatch
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-actions: write

      - name: Dispatch cd-cleanup workflow
        shell: bash
        env:
          GITHUB_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_DISPATCH_REF: ${{ github.head_ref || github.ref_name }}
          BUILD_CHECK_RUN_ID: ${{ needs.create-checks.outputs.build-check-run-id }}
          UPLOAD_DATASET_CHECK_RUN_ID: ${{ needs.create-checks.outputs.upload-dataset-check-run-id }}
          CLEANUP_CHECK_RUN_ID: ${{ needs.create-checks.outputs.cleanup-check-run-id }}
          BUILD_CONCLUSION: failure
          UPLOAD_DATASET_CONCLUSION: failure
        run: |
          sh .github/scripts/deploy-dispatch.sh
