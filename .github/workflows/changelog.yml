name: Changelog

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-release-notes:
    name: Update release notes from changelog
    runs-on: ubuntu-latest

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 1

      - name: Extract changelog section
        id: extract-changelog
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set +e
          .github/scripts/changelog.py "$RELEASE_TAG" > release-notes.md
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "Could not extract changelog section for '$RELEASE_TAG'; skipping release note update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          exit "$status"

      - name: Create GitHub App token
        if: steps.extract-changelog.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Update release notes
        if: steps.extract-changelog.outputs.skip != 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const body = require('node:fs').readFileSync('release-notes.md', 'utf8');
            await github.rest.repos.updateRelease({
              ...context.repo,
              release_id: context.payload.release.id,
              body,
            });
